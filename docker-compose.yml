# Ongoza CyberHub - Production/Testing Orchestration
services:
  # 1. Nginx Reverse Proxy (Gateway)
  nginx:
    image: nginx:stable-alpine
    container_name: hub_prod_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      nextjs:
        condition: service_started
      django:
        condition: service_healthy
      fastapi:
        condition: service_started
    networks:
      - ongoza-network
    restart: unless-stopped
    # Keep nginx lightweight on small VPS
    mem_limit: ${NGINX_MEM_LIMIT:-128m}
    cpus: ${NGINX_CPUS:-0.25}
    healthcheck:
      # Use 127.0.0.1 so Host matches local.conf (localhost IPv6 ::1 does not match server_name localhost)
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. PostgreSQL Relational (Django)
  postgres-relational:
    build:
      context: .
      dockerfile: backend/docker/postgres.Dockerfile
    container_name: hub_prod_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ongozacyberhub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Lower baseline RAM for small VPS (safe defaults; override via env if needed)
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}",
        "-c",
        "work_mem=${POSTGRES_WORK_MEM:-4MB}",
        "-c",
        "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}",
        "-c",
        "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ongoza-network
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-900m}
    cpus: ${POSTGRES_CPUS:-1.0}

  # 3. PostgreSQL Vector (FastAPI)
  postgres-vector:
    build:
      context: .
      dockerfile: backend/docker/vector_db.Dockerfile
    container_name: hub_prod_vector_db
    environment:
      POSTGRES_DB: ${VECTOR_POSTGRES_DB:-ongozacyberhub_vector}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - vector_db_data:/var/lib/postgresql/data
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=${VECTOR_POSTGRES_SHARED_BUFFERS:-256MB}",
        "-c",
        "work_mem=${VECTOR_POSTGRES_WORK_MEM:-4MB}",
        "-c",
        "maintenance_work_mem=${VECTOR_POSTGRES_MAINTENANCE_WORK_MEM:-64MB}",
        "-c",
        "max_connections=${VECTOR_POSTGRES_MAX_CONNECTIONS:-100}"
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ongoza-network
    restart: unless-stopped
    mem_limit: ${VECTOR_POSTGRES_MEM_LIMIT:-900m}
    cpus: ${VECTOR_POSTGRES_CPUS:-1.0}

  # 4. Redis
  redis:
    image: redis:7-alpine
    container_name: hub_prod_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Cap redis memory so it cannot consume the whole host.
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    networks:
      - ongoza-network
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-320m}
    cpus: ${REDIS_CPUS:-0.5}

  # 5. Django Backend
  django:
    image: ghcr.io/cresdynamics-lang/och-django:latest
    container_name: hub_prod_django
    env_file:
      - ./backend/django_app/.env
    environment:
      DJANGO_SECRET_KEY: flxDJLo}59g{G4xF#WDylXt&~nsG-zJmhS~%:j.^M_br)z'a9U
      JWT_SECRET_KEY: psd3zhcbrDdxzbzDsZW9NeavR_wLXLP3S_LD4kNc5kk
      DB_NAME: ${POSTGRES_DB:-ongozacyberhub}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: postgres-relational
      DB_PORT: 5432
      FASTAPI_BASE_URL: http://fastapi:8001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django,nginx,cybochengine.africa,www.cybochengine.africa,69.30.235.220}
    volumes:
      - ./backend/django_app:/app
      - django_static:/app/staticfiles
      - django_media:/app/media
    depends_on:
      postgres-relational:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ongoza-network
    restart: unless-stopped
    # `runserver` is memory-hungry and not ideal for production; gunicorn is lighter/more stable.
    command:
      [
        "gunicorn",
        "core.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "${DJANGO_WORKERS:-2}",
        "--threads",
        "${DJANGO_THREADS:-2}",
        "--worker-class",
        "sync",
        "--timeout",
        "${DJANGO_TIMEOUT:-120}",
        "--keep-alive",
        "5",
        "--max-requests",
        "${DJANGO_MAX_REQUESTS:-500}",
        "--max-requests-jitter",
        "${DJANGO_MAX_REQUESTS_JITTER:-50}",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
        "--log-level",
        "${DJANGO_LOG_LEVEL:-info}"
      ]
    mem_limit: ${DJANGO_MEM_LIMIT:-900m}
    cpus: ${DJANGO_CPUS:-1.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # 6. FastAPI AI Service
  fastapi:
    image: ghcr.io/cresdynamics-lang/och-fastapi:latest
    container_name: hub_prod_fastapi
    environment:
      REDIS_URL: redis://redis:6379/1
      VECTOR_DB_HOST: postgres-vector
      VECTOR_DB_PORT: 5432
      VECTOR_DB_NAME: ${VECTOR_POSTGRES_DB:-ongozacyberhub_vector}
      VECTOR_DB_USER: ${POSTGRES_USER:-postgres}
      VECTOR_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_API_URL: http://django:8000
      CORS_ORIGINS: '["http://localhost:3000","https://cybochengine.africa"]'
      JWT_SECRET_KEY: psd3zhcbrDdxzbzDsZW9NeavR_wLXLP3S_LD4kNc5kk
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./backend/fastapi_app:/app
    depends_on:
      postgres-vector:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - ongoza-network
    restart: unless-stopped
    command: >
      sh -c "pip install -r /app/requirements.txt --quiet --no-cache-dir 2>/dev/null || true &&
             uvicorn main:app
             --host 0.0.0.0
             --port 8001
             --workers ${FASTAPI_WORKERS:-2}
             --log-level ${FASTAPI_LOG_LEVEL:-info}
             --timeout-keep-alive 5"
    mem_limit: ${FASTAPI_MEM_LIMIT:-800m}
    cpus: ${FASTAPI_CPUS:-1.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 7. Next.js Frontend
  # Small VPS: `bash deploy/ensure-swap-2g.sh` (swap) + `bash deploy/build-next-low-mem.sh` (BuildKit parallelism=1).
  # Disk: `bash deploy/docker-prune-safe.sh` periodically.
  nextjs:
    build:
      context: .
      dockerfile: frontend/docker/nextjs.Dockerfile
      args:
        - NEXT_PUBLIC_DJANGO_API_URL=${NEXT_PUBLIC_DJANGO_API_URL}
        - NEXT_PUBLIC_FRONTEND_URL=${NEXT_PUBLIC_FRONTEND_URL}
        - NEXT_PUBLIC_FASTAPI_API_URL=${NEXT_PUBLIC_FASTAPI_API_URL}
    image: ghcr.io/cresdynamics-lang/och-nextjs:latest
    container_name: hub_prod_nextjs
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Keep Next runtime heap bounded on small VPS; adjust if you see OOMs under load.
      NODE_OPTIONS: ${NEXT_NODE_OPTIONS:---max-old-space-size=512}
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # Server-side BFF must reach Django on the compose network (never rely on public URL from inside the container).
      NEXT_RUNTIME_DOCKER: "1"
      DJANGO_INTERNAL_URL: ${DJANGO_INTERNAL_URL:-http://django:8000}
      DJANGO_API_URL: ${DJANGO_API_URL:-http://django:8000}
      FASTAPI_INTERNAL_URL: http://fastapi:8001
      # Runtime public URLs (used by server-side code / diagnostics). Must match build args.
      NEXT_PUBLIC_DJANGO_API_URL: ${NEXT_PUBLIC_DJANGO_API_URL}
      NEXT_PUBLIC_FASTAPI_API_URL: ${NEXT_PUBLIC_FASTAPI_API_URL}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL}
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      - nextjs_cache:/app/.next/cache
    networks:
      - ongoza-network
    restart: unless-stopped
    mem_limit: ${NEXTJS_MEM_LIMIT:-800m}
    cpus: ${NEXTJS_CPUS:-1.0}
    healthcheck:
      # `/` may redirect depending on app shell; treat any < 400 as healthy.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/legacy-home', (r) => {if (r.statusCode >= 400) throw new Error(r.statusCode)})\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  vector_db_data:
  redis_data:
  django_static:
  django_media:
  nextjs_cache:

networks:
  ongoza-network:
    driver: bridge
