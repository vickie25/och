name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [django, fastapi, nextjs]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Django image
        if: matrix.service == 'django'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/docker/django.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push FastAPI image
        if: matrix.service == 'fastapi'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/docker/fastapi.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Next.js image
        if: matrix.service == 'nextjs'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/docker/nextjs.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_DJANGO_API_URL=https://cybochengine.africa/api
            NEXT_PUBLIC_FRONTEND_URL=https://cybochengine.africa
            NEXT_PUBLIC_FASTAPI_API_URL=https://cybochengine.africa/ai
            NODE_OPTIONS=--max-old-space-size=3072
            NEXT_BUILD_LOW_MEMORY=1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-openapi:
    name: Generate and Merge OpenAPI Schemas
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Merge OpenAPI schemas
        run: |
          python shared/openapi/merge_openapi.py || echo "Schema merge skipped"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://cybochengine.africa

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 69.30.235.220
          username: administrator
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/och
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S git pull origin main
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker-compose down || true
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S docker-compose up -d --build
